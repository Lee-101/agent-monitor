{% extends "base.html" %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-white">历史数据</h1>
    <p class="text-sm text-gray-400 mt-1">查看历史指标趋势和智能体活动</p>
</div>

<!-- Controls -->
<section class="mb-6">
    <div class="flex flex-wrap items-center gap-4">
        <div>
            <label class="text-sm text-gray-400 block mb-1">时间范围</label>
            <select id="time-range" class="bg-gray-800 text-white text-sm rounded-lg px-3 py-2 border border-gray-700">
                <option value="1">1 小时</option>
                <option value="6">6 小时</option>
                <option value="24" selected>24 小时</option>
                <option value="72">3 天</option>
                <option value="168">7 天</option>
            </select>
        </div>
        <div>
            <label class="text-sm text-gray-400 block mb-1">指标来源</label>
            <select id="collector-select" class="bg-gray-800 text-white text-sm rounded-lg px-3 py-2 border border-gray-700">
                <option value="system">系统</option>
                <option value="gpu">GPU</option>
                <option value="hermes">Hermes</option>
                <option value="claude_code">Claude Code</option>
            </select>
        </div>
        <div>
            <label class="text-sm text-gray-400 block mb-1">指标名称</label>
            <select id="metric-select" class="bg-gray-800 text-white text-sm rounded-lg px-3 py-2 border border-gray-700">
                <option value="">全部</option>
            </select>
        </div>
        <button onclick="loadHistory()" class="self-end bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg transition">
            查询
        </button>
    </div>
</section>

<!-- Chart -->
<section class="mb-8">
    <div class="bg-gray-900 rounded-xl p-5 border border-gray-800">
        <canvas id="history-chart" height="300"></canvas>
    </div>
</section>

<!-- Data Table -->
<section>
    <h2 class="text-lg font-semibold text-gray-300 mb-4">数据详情</h2>
    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-gray-800">
                        <th class="text-left text-gray-400 px-4 py-3">时间</th>
                        <th class="text-left text-gray-400 px-4 py-3">指标</th>
                        <th class="text-right text-gray-400 px-4 py-3">值</th>
                        <th class="text-left text-gray-400 px-4 py-3">单位</th>
                        <th class="text-left text-gray-400 px-4 py-3">标签</th>
                    </tr>
                </thead>
                <tbody id="data-table-body">
                    <tr><td colspan="5" class="text-center text-gray-500 py-8">选择查询条件后点击查询</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<!-- Agent Snapshots -->
<section class="mt-8">
    <h2 class="text-lg font-semibold text-gray-300 mb-4">智能体历史快照</h2>
    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-gray-800">
                        <th class="text-left text-gray-400 px-4 py-3">时间</th>
                        <th class="text-left text-gray-400 px-4 py-3">智能体</th>
                        <th class="text-left text-gray-400 px-4 py-3">状态</th>
                        <th class="text-right text-gray-400 px-4 py-3">CPU</th>
                        <th class="text-right text-gray-400 px-4 py-3">内存</th>
                        <th class="text-right text-gray-400 px-4 py-3">会话</th>
                    </tr>
                </thead>
                <tbody id="snapshots-table-body">
                    <tr><td colspan="6" class="text-center text-gray-500 py-8">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
const historyChart = new Chart(document.getElementById('history-chart'), {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
        responsive: true,
        scales: {
            y: { ticks: { color: '#9ca3af' }, grid: { color: '#1f2937' } },
            x: { ticks: { color: '#9ca3af', maxTicksLimit: 20 }, grid: { color: '#1f2937' } }
        },
        plugins: { legend: { labels: { color: '#d1d5db' } } }
    }
});

const chartColors = [
    'rgb(59, 130, 246)', 'rgb(34, 197, 94)', 'rgb(168, 85, 247)',
    'rgb(249, 115, 22)', 'rgb(236, 72, 153)', 'rgb(20, 184, 166)',
];

function loadHistory() {
    const hours = document.getElementById('time-range').value;
    const collector = document.getElementById('collector-select').value;
    const metricName = document.getElementById('metric-select').value;

    let url = `/api/history/metrics?collector=${collector}&hours=${hours}`;
    if (metricName) url += `&name=${metricName}`;

    fetch(url).then(r => r.json()).then(data => {
        // Group metrics by name
        const groups = {};
        data.metrics.forEach(m => {
            if (!groups[m.name]) groups[m.name] = [];
            groups[m.name].push(m);
        });

        // Update chart
        const names = Object.keys(groups);
        historyChart.data.datasets = names.map((name, i) => ({
            label: name,
            data: groups[name].map(m => ({ x: new Date(m.timestamp * 1000), y: m.value })),
            borderColor: chartColors[i % chartColors.length],
            tension: 0.3,
            pointRadius: 0,
        }));
        historyChart.update();

        // Update table
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = data.metrics.slice(-200).reverse().map(m =>
            `<tr class="border-b border-gray-800 hover:bg-gray-800/50">
                <td class="px-4 py-2 text-gray-300">${new Date(m.timestamp * 1000).toLocaleString('zh-CN')}</td>
                <td class="px-4 py-2 text-white">${m.name}</td>
                <td class="px-4 py-2 text-right text-white">${typeof m.value === 'number' ? m.value.toFixed(2) : m.value}</td>
                <td class="px-4 py-2 text-gray-400">${m.unit || ''}</td>
                <td class="px-4 py-2 text-gray-400">${JSON.stringify(m.tags || {})}</td>
            </tr>`
        ).join('');
    });
}

// Load metric names when collector changes
document.getElementById('collector-select').addEventListener('change', function() {
    const collector = this.value;
    fetch(`/api/history/metrics?collector=${collector}&hours=1`).then(r => r.json()).then(data => {
        const names = [...new Set(data.metrics.map(m => m.name))];
        const select = document.getElementById('metric-select');
        select.innerHTML = '<option value="">全部</option>' +
            names.map(n => `<option value="${n}">${n}</option>`).join('');
    });
});

// Load agent snapshots
function loadSnapshots() {
    fetch('/api/history/agents?limit=50').then(r => r.json()).then(data => {
        const tbody = document.getElementById('snapshots-table-body');
        if (!data.snapshots?.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-gray-500 py-8">暂无历史数据</td></tr>';
            return;
        }
        tbody.innerHTML = data.snapshots.map(s =>
            `<tr class="border-b border-gray-800 hover:bg-gray-800/50">
                <td class="px-4 py-2 text-gray-300">${new Date(s.timestamp * 1000).toLocaleString('zh-CN')}</td>
                <td class="px-4 py-2 text-white">${s.agent_name}</td>
                <td class="px-4 py-2"><span class="status-dot ${s.is_running ? 'status-running' : 'status-stopped'}"></span></td>
                <td class="px-4 py-2 text-right text-white">${(s.cpu_percent || 0).toFixed(1)}%</td>
                <td class="px-4 py-2 text-right text-white">${formatBytes(s.memory_rss_bytes || 0)}</td>
                <td class="px-4 py-2 text-right text-white">${s.active_sessions || 0}</td>
            </tr>`
        ).join('');
    });
}

// Initial loads
loadHistory();
loadSnapshots();
</script>
{% endblock %}
